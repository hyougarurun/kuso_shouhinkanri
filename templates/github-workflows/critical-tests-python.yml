name: Critical Tests (Python)

# Python プロジェクト用の Critical Tests ワークフロー
# critical-tests.yml の代わりにこちらを使用する

on:
  pull_request:
    branches:
      - main
      - production
  push:
    branches:
      - main
      - production

concurrency:
  group: critical-tests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-critical-tests:
    name: Run P0-CRITICAL Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy .

      - name: Run P0-CRITICAL unit tests
        run: pytest tests/critical/ -v --tb=short
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      - name: Run P0-CRITICAL integration tests
        run: pytest tests/integration/ -m critical -v
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          STRIPE_TEST_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            .pytest_cache/
            htmlcov/
          retention-days: 14
